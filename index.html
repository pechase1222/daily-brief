<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0">
<meta name="apple-mobile-web-app-capable" content="yes">
<title>Paul's Daily Brief</title>
<style>
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body { font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif; background: #0f1117; color: #e8eaf0; padding: 20px; max-width: 600px; margin: 0 auto; }
  .hero { text-align: center; padding: 60px 20px; }
  .emoji { font-size: 64px; margin-bottom: 16px; }
  h1 { font-size: 24px; font-weight: 700; margin-bottom: 8px; }
  p { color: #9ba3bf; font-size: 15px; line-height: 1.6; }
  .badge { display: inline-block; background: #5b73e8; color: white; border-radius: 20px; padding: 6px 16px; font-size: 13px; font-weight: 600; margin-top: 20px; }
</style>
</head>
<body>
<div class="hero">
  <div class="emoji">☀️</div>
  <h1>Paul's Daily Brief</h1>
  <p>Your morning brief will appear here every day at 6am — surf, calendar, customer alerts, finances, and more.</p>
  <div class="badge">Powered by Claude</div>
</div>
</body>
</html>
